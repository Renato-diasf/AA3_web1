<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.usuario.lista.page.title}">PESCD - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f3f6ef; color: #17211a; font-family: Georgia, "Times New Roman", serif; }
        .topbar { background: #fbfdf9; border-bottom: 1px solid #d9e0da; }
        .content-shell { max-width: 1120px; }
        .small-muted, .table, .btn, .alert { font-family: Verdana, Geneva, sans-serif; }
        .small-muted { color: #647069; }
        .btn-pescd { background: #1f6f4a; border-color: #1f6f4a; color: #fff; font-weight: 700; }
        .btn-pescd:hover { background: #155637; border-color: #155637; color: #fff; }
        .btn-outline-pescd { border-color: #1f6f4a; color: #1f6f4a; font-weight: 700; }
        .btn-outline-pescd:hover { background: #1f6f4a; color: #fff; }
        .table { --bs-table-bg: #fbfdf9; --bs-table-striped-bg: #f5f8f1; border-color: #d9e0da; }
    </style>
</head>
<body>
<header class="topbar">
    <div class="container content-shell py-3 d-flex flex-column flex-sm-row justify-content-between gap-3">
        <div>
            <div class="h4 mb-1" th:text="#{login.brand}">PESCD</div>
            <div class="small-muted">
                <span th:text="#{dashboard.logged.as}">Logado como</span>
                <strong sec:authentication="name">admin</strong>
            </div>
        </div>
        <div class="d-flex gap-2 align-items-start">
            <a class="btn btn-outline-pescd" th:href="@{/admin/dashboard}" th:text="#{nav.dashboard}">Painel</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-pescd" type="submit" th:text="#{dashboard.logout}">Sair</button>
            </form>
        </div>
    </div>
</header>

<main class="container content-shell py-5">
    <div class="alert alert-success" th:if="${successMessageKey}" th:text="#{${successMessageKey}}">
        Sucesso.
    </div>
    <div class="alert alert-danger" th:if="${errorMessageKey}" th:text="#{${errorMessageKey}}">
        Erro.
    </div>

    <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
        <div>
            <h1 class="display-6 mb-2" th:text="#{admin.usuario.lista.titulo}">Usuarios</h1>
            <p class="small-muted mb-0" th:text="#{admin.usuario.lista.subtitulo}">Gerencie usuarios do sistema.</p>
        </div>
        <a class="btn btn-pescd align-self-start" th:href="@{/admin/usuarios/novo}" th:text="#{admin.usuario.botao.novo}">
            Novo usuario
        </a>
    </div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(usuarios)}">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th th:text="#{admin.usuario.campo.nome}">Nome</th>
                <th th:text="#{admin.usuario.campo.email}">E-mail</th>
                <th th:text="#{admin.usuario.campo.username}">Username</th>
                <th th:text="#{admin.usuario.campo.perfil}">Perfil</th>
                <th th:text="#{admin.usuario.campo.enabled}">Ativo</th>
                <th th:text="#{oferta.campo.acoes}">Acoes</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.nomeCompleto}">Nome</td>
                <td th:text="${usuario.email}">email@ufscar.br</td>
                <td th:text="${usuario.username}">username</td>
                <td>
                    <span th:each="perfil, iter : ${usuario.perfis}">
                        <span th:text="#{'admin.usuario.perfil.' + ${perfil.nome.name()}}">Perfil</span><span th:if="${!iter.last}">, </span>
                    </span>
                </td>
                <td th:text="${usuario.enabled} ? #{admin.usuario.enabled.sim} : #{admin.usuario.enabled.nao}">Sim</td>
                <td>
                    <div class="d-flex flex-column flex-md-row gap-2">
                        <a class="btn btn-sm btn-outline-pescd"
                           th:href="@{/admin/usuarios/{id}/editar(id=${usuario.id})}"
                           th:text="#{botao.editar}">Editar</a>
                        <form th:action="@{/admin/usuarios/{id}/excluir(id=${usuario.id})}" method="post"
                              th:attr="onsubmit=|return confirm('#{admin.usuario.confirmar.exclusao}');|">
                            <button class="btn btn-sm btn-outline-danger" type="submit" th:text="#{botao.excluir}">
                                Excluir
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="alert alert-light border" th:if="${#lists.isEmpty(usuarios)}" th:text="#{admin.usuario.lista.vazia}">
        Nenhum usuario cadastrado.
    </div>
</main>
</body>
</html>
