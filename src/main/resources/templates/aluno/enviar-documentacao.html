<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{documentacao.page.title}">PESCD - Enviar documentacao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f3f6ef;
            color: #17211a;
            font-family: Georgia, "Times New Roman", serif;
        }

        .topbar {
            background: #fbfdf9;
            border-bottom: 1px solid #d9e0da;
        }

        .content-shell {
            max-width: 920px;
        }

        .small-muted, .form-text, label, .form-control, .alert, .btn {
            font-family: Verdana, Geneva, sans-serif;
        }

        .small-muted, .form-text {
            color: #647069;
        }

        .btn-pescd {
            background: #1f6f4a;
            border-color: #1f6f4a;
            color: #fff;
            font-weight: 700;
        }

        .btn-pescd:hover {
            background: #155637;
            border-color: #155637;
            color: #fff;
        }

        .btn-outline-pescd {
            border-color: #1f6f4a;
            color: #1f6f4a;
            font-weight: 700;
        }

        .btn-outline-pescd:hover {
            background: #1f6f4a;
            color: #fff;
        }

        .form-panel {
            background: #fbfdf9;
            border: 1px solid #d9e0da;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="container content-shell py-3 d-flex flex-column flex-sm-row justify-content-between gap-3">
        <div>
            <div class="h4 mb-1" th:text="#{login.brand}">PESCD</div>
            <div class="small-muted">
                <span th:text="#{dashboard.logged.as}">Logado como</span>
                <strong sec:authentication="name">usuario</strong>
            </div>
        </div>
        <a class="btn btn-outline-pescd align-self-start" th:href="@{/aluno/ofertas}" th:text="#{botao.voltar.lista}">
            Voltar a lista
        </a>
    </div>
</header>

<main class="container content-shell py-5">
    <div class="mb-4">
        <h1 class="display-6 mb-2" th:text="#{documentacao.titulo}">Enviar documentacao de docencia</h1>
        <p class="small-muted mb-0">
            <span th:text="#{oferta.campo.nome}">Oferta</span>:
            <strong th:text="${oferta.nome}">PESCD</strong>
        </p>
    </div>

    <div class="alert alert-danger" th:if="${errorMessageKey}" th:text="#{${errorMessageKey}}">
        Erro de validacao.
    </div>

    <form class="form-panel p-4"
          th:action="@{/aluno/oferta/{id}/enviar-documentacao(id=${oferta.id})}"
          th:object="${documentacaoDocenciaForm}"
          method="post"
          enctype="multipart/form-data">

        <div class="row g-3">
            <div class="col-12">
                <label class="form-label" for="nomeInstituicao" th:text="#{documentacao.campo.instituicao}">
                    Nome da instituicao *
                </label>
                <input class="form-control" id="nomeInstituicao" type="text" th:field="*{nomeInstituicao}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nomeInstituicao')}" th:errors="*{nomeInstituicao}">
                    Instituicao obrigatoria.
                </div>
            </div>

            <div class="col-md-7">
                <label class="form-label" for="nomeDisciplina" th:text="#{documentacao.campo.nome}">
                    Nome da disciplina *
                </label>
                <input class="form-control" id="nomeDisciplina" type="text" th:field="*{nomeDisciplina}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nomeDisciplina')}" th:errors="*{nomeDisciplina}">
                    Nome obrigatorio.
                </div>
            </div>

            <div class="col-md-5">
                <label class="form-label" for="cursoDisciplina" th:text="#{documentacao.campo.curso}">
                    Curso da disciplina *
                </label>
                <input class="form-control" id="cursoDisciplina" type="text" th:field="*{cursoDisciplina}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cursoDisciplina')}" th:errors="*{cursoDisciplina}">
                    Curso obrigatorio.
                </div>
            </div>

            <div class="col-md-4">
                <label class="form-label" for="cargaHoraria" th:text="#{documentacao.campo.carga}">
                    Carga horaria *
                </label>
                <input class="form-control" id="cargaHoraria" type="number" min="1" th:field="*{cargaHoraria}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cargaHoraria')}" th:errors="*{cargaHoraria}">
                    Carga horaria obrigatoria.
                </div>
            </div>

            <div class="col-12">
                <label class="form-label" for="arquivoDocumentacao" th:text="#{documentacao.campo.arquivo}">
                    Arquivo PDF *
                </label>
                <input class="form-control" id="arquivoDocumentacao" name="arquivoDocumentacao" type="file" accept="application/pdf,.pdf">
                <div class="form-text" th:text="#{documentacao.campo.arquivo.ajuda}">PDF ate 5MB.</div>
            </div>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end mt-4">
            <a class="btn btn-outline-pescd" th:href="@{/aluno/ofertas}" th:text="#{botao.cancelar}">Cancelar</a>
            <button class="btn btn-pescd" type="submit" th:text="#{documentacao.botao.enviar}">
                Enviar documentacao
            </button>
        </div>
    </form>
</main>
</body>
</html>
