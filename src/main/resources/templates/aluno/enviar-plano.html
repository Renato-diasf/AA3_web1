<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{plano.page.title}">PESCD - Enviar plano</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f3f6ef;
            color: #17211a;
            font-family: Georgia, "Times New Roman", serif;
        }

        .topbar {
            background: #fbfdf9;
            border-bottom: 1px solid #d9e0da;
        }

        .content-shell {
            max-width: 920px;
        }

        .small-muted, .form-text, label, .form-select, .form-control, .alert, .btn {
            font-family: Verdana, Geneva, sans-serif;
        }

        .small-muted, .form-text {
            color: #647069;
        }

        .btn-pescd {
            background: #1f6f4a;
            border-color: #1f6f4a;
            color: #fff;
            font-weight: 700;
        }

        .btn-pescd:hover {
            background: #155637;
            border-color: #155637;
            color: #fff;
        }

        .btn-outline-pescd {
            border-color: #1f6f4a;
            color: #1f6f4a;
            font-weight: 700;
        }

        .btn-outline-pescd:hover {
            background: #1f6f4a;
            color: #fff;
        }

        .form-panel {
            background: #fbfdf9;
            border: 1px solid #d9e0da;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="container content-shell py-3 d-flex flex-column flex-sm-row justify-content-between gap-3">
        <div>
            <div class="h4 mb-1" th:text="#{login.brand}">PESCD</div>
            <div class="small-muted">
                <span th:text="#{dashboard.logged.as}">Logado como</span>
                <strong sec:authentication="name">usuario</strong>
            </div>
        </div>
        <a class="btn btn-outline-pescd align-self-start" th:href="@{/aluno/ofertas}" th:text="#{botao.voltar.lista}">
            Voltar a lista
        </a>
    </div>
</header>

<main class="container content-shell py-5">
    <div class="mb-4">
        <h1 class="display-6 mb-2" th:text="#{plano.titulo}">Enviar plano de trabalho</h1>
        <p class="small-muted mb-0">
            <span th:text="#{oferta.campo.nome}">Oferta</span>:
            <strong th:text="${oferta.nome}">PESCD</strong>
        </p>
    </div>

    <div class="alert alert-danger" th:if="${errorMessageKey}" th:text="#{${errorMessageKey}}">
        Erro de validacao.
    </div>

    <form class="form-panel p-4"
          th:action="@{/aluno/oferta/{id}/enviar-plano(id=${oferta.id})}"
          th:object="${planoTrabalhoForm}"
          method="post"
          enctype="multipart/form-data">

        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label" for="codigoDisciplina" th:text="#{plano.campo.codigo}">Codigo *</label>
                <input class="form-control" id="codigoDisciplina" type="text" th:field="*{codigoDisciplina}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('codigoDisciplina')}" th:errors="*{codigoDisciplina}">
                    Codigo obrigatorio.
                </div>
            </div>

            <div class="col-md-8">
                <label class="form-label" for="nomeDisciplina" th:text="#{plano.campo.nome}">Nome *</label>
                <input class="form-control" id="nomeDisciplina" type="text" th:field="*{nomeDisciplina}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nomeDisciplina')}" th:errors="*{nomeDisciplina}">
                    Nome obrigatorio.
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="cursoDisciplina" th:text="#{plano.campo.curso}">Curso *</label>
                <input class="form-control" id="cursoDisciplina" type="text" th:field="*{cursoDisciplina}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cursoDisciplina')}" th:errors="*{cursoDisciplina}">
                    Curso obrigatorio.
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="professorSupervisorId" th:text="#{plano.campo.supervisor}">
                    Professor supervisor *
                </label>
                <select class="form-select" id="professorSupervisorId" th:field="*{professorSupervisorId}">
                    <option value="" th:text="#{plano.campo.supervisor.selecione}">Selecione</option>
                    <option th:each="supervisor : ${supervisores}"
                            th:value="${supervisor.id}"
                            th:text="${supervisor.nomeCompleto}">
                        Professor
                    </option>
                </select>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('professorSupervisorId')}" th:errors="*{professorSupervisorId}">
                    Supervisor obrigatorio.
                </div>
            </div>

            <div class="col-12">
                <label class="form-label" for="arquivoPlano" th:text="#{plano.campo.arquivo}">Arquivo PDF *</label>
                <input class="form-control" id="arquivoPlano" name="arquivoPlano" type="file" accept="application/pdf,.pdf">
                <div class="form-text" th:text="#{plano.campo.arquivo.ajuda}">PDF ate 5MB.</div>
            </div>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end mt-4">
            <a class="btn btn-outline-pescd" th:href="@{/aluno/ofertas}" th:text="#{botao.cancelar}">Cancelar</a>
            <button class="btn btn-pescd" type="submit" th:text="#{plano.botao.enviar}">Enviar plano</button>
        </div>
    </form>
</main>
</body>
</html>
