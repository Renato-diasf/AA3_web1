<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.page.title}">PESCD - Login</title>
    <style>
        :root {
            --ink: #17211a;
            --muted: #66716a;
            --line: #d9e0da;
            --surface: #fbfdf9;
            --accent: #1f6f4a;
            --accent-dark: #14472f;
            --danger-bg: #fde8e4;
            --danger-text: #8b2417;
            --success-bg: #e4f5eb;
            --success-text: #1f5d3a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                    linear-gradient(135deg, rgba(31, 111, 74, 0.12), transparent 40%),
                    linear-gradient(315deg, rgba(188, 132, 39, 0.14), transparent 35%),
                    #f3f6ef;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(100%, 920px);
            display: grid;
            grid-template-columns: 1fr 420px;
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: 0 24px 70px rgba(23, 33, 26, 0.14);
        }

        .brand-panel {
            padding: 48px;
            background: #203928;
            color: #f7fbf5;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 560px;
        }

        .brand-panel h1 {
            margin: 0;
            font-size: clamp(2.4rem, 7vw, 4.8rem);
            line-height: 0.94;
            letter-spacing: 0;
        }

        .brand-panel p {
            margin: 28px 0 0;
            max-width: 420px;
            color: #d7e4d8;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .login-panel {
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .locale-switch {
            align-self: flex-end;
            display: flex;
            gap: 10px;
            margin-bottom: 36px;
            font-family: Verdana, Geneva, sans-serif;
            font-size: 0.82rem;
        }

        .locale-switch a {
            color: var(--accent-dark);
            text-decoration: none;
            font-weight: 700;
        }

        .login-panel h2 {
            margin: 0 0 8px;
            font-size: 1.8rem;
        }

        .login-panel .subtitle {
            margin: 0 0 28px;
            color: var(--muted);
            line-height: 1.5;
            font-family: Verdana, Geneva, sans-serif;
            font-size: 0.95rem;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-family: Verdana, Geneva, sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            padding: 13px 14px;
            font: 1rem Verdana, Geneva, sans-serif;
            color: var(--ink);
            background: #fff;
        }

        input:focus {
            outline: 3px solid rgba(31, 111, 74, 0.18);
            border-color: var(--accent);
        }

        button {
            width: 100%;
            border: 0;
            padding: 14px 18px;
            margin-top: 8px;
            background: var(--accent);
            color: #fff;
            font: 700 0.98rem Verdana, Geneva, sans-serif;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        .alert {
            padding: 12px 14px;
            margin-bottom: 18px;
            font-family: Verdana, Geneva, sans-serif;
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .alert-danger {
            background: var(--danger-bg);
            color: var(--danger-text);
            border: 1px solid rgba(139, 36, 23, 0.18);
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid rgba(31, 93, 58, 0.18);
        }

        @media (max-width: 760px) {
            main {
                grid-template-columns: 1fr;
            }

            .brand-panel {
                min-height: auto;
                padding: 36px 28px;
            }

            .login-panel {
                padding: 36px 28px;
            }
        }
    </style>
</head>
<body>
<main>
    <section class="brand-panel" aria-labelledby="system-name">
        <div>
            <h1 id="system-name" th:text="#{login.brand}">PESCD</h1>
            <p th:text="#{login.brand.description}">Sistema de controle do Programa de Estagio Supervisionado de Capacitacao Docente.</p>
        </div>
    </section>

    <section class="login-panel" aria-labelledby="login-title">
        <nav class="locale-switch" aria-label="Idioma">
            <a th:href="@{/login(lang='pt-BR')}">PT</a>
            <a th:href="@{/login(lang='en')}">EN</a>
        </nav>

        <h2 id="login-title" th:text="#{login.title}">Acesso ao sistema</h2>
        <p class="subtitle" th:text="#{login.subtitle}">Entre com seu usuario e senha institucionais.</p>

        <div th:if="${param.error}" class="alert alert-danger" th:text="#{${loginErrorMessageKey}}">
            Usuario ou senha invalidos.
        </div>

        <div th:if="${param.logout}" class="alert alert-success" th:text="#{${logoutMessageKey}}">
            Logout realizado com sucesso.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="field">
                <label for="username" th:text="#{login.username}">Usuario</label>
                <input id="username" name="username" type="text" autocomplete="username" required autofocus>
            </div>

            <div class="field">
                <label for="password" th:text="#{login.password}">Senha</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>

            <button type="submit" th:text="#{login.submit}">Entrar</button>
        </form>
          <a class="btn" th:href="@{/ofertas}"
              th:text="#{login.visitante}"
              style="display:block; text-align:center; margin-top:12px; padding:12px 18px; border:1px solid var(--accent); color:var(--accent); font-weight:700; text-decoration:none; background:transparent"
              role="button">Entrar como visitante</a>
    </section>
</main>
</body>
</html>
