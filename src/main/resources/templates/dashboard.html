<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{dashboard.page.title}">PESCD - Dashboard</title>
    <style>
        :root {
            --ink: #17211a;
            --muted: #647069;
            --line: #d9e0da;
            --accent: #1f6f4a;
            --surface: #fbfdf9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background: #f3f6ef;
        }

        header {
            border-bottom: 1px solid var(--line);
            background: var(--surface);
        }

        .topbar {
            width: min(100%, 1120px);
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .user {
            font: 0.9rem Verdana, Geneva, sans-serif;
            color: var(--muted);
        }

        main {
            width: min(100%, 1120px);
            margin: 0 auto;
            padding: 56px 24px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(2rem, 6vw, 4rem);
            letter-spacing: 0;
            line-height: 1;
        }

        p {
            margin: 0;
            max-width: 720px;
            color: var(--muted);
            font: 1rem/1.7 Verdana, Geneva, sans-serif;
        }

        form {
            margin: 0;
        }

        button {
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            padding: 10px 14px;
            font: 700 0.86rem Verdana, Geneva, sans-serif;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent);
            color: #fff;
        }

        .dashboard-action {
            display: inline-block;
            margin-top: 24px;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 14px;
            text-decoration: none;
            font: 700 0.86rem Verdana, Geneva, sans-serif;
        }

        .dashboard-action:hover {
            background: var(--accent);
            color: #fff;
        }

        @media (max-width: 640px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="topbar">
        <div>
            <div class="brand" th:text="#{login.brand}">PESCD</div>
            <div class="user">
                <span th:text="#{dashboard.logged.as}">Logado como</span>
                <strong sec:authentication="name">usuario</strong>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" th:text="#{dashboard.logout}">Sair</button>
        </form>
    </div>
</header>

<main>
    <h1 th:text="#{${dashboardTitleKey}}">Dashboard</h1>
    <p th:text="#{${dashboardDescriptionKey}}">Painel inicial do perfil autenticado.</p>
    <a th:if="${dashboardActionUrl}" class="dashboard-action" th:href="@{${dashboardActionUrl}}" th:text="#{${dashboardActionKey}}">Ação</a>
</main>
</body>
</html>
