<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{supervisor.plano.page.title}">PESCD - Aprovar plano</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f3f6ef;
            color: #17211a;
            font-family: Georgia, "Times New Roman", serif;
        }

        .topbar {
            background: #fbfdf9;
            border-bottom: 1px solid #d9e0da;
        }

        .content-shell {
            max-width: 960px;
        }

        .small-muted, .readonly-label, .form-text, label, .form-control, .alert, .btn {
            font-family: Verdana, Geneva, sans-serif;
        }

        .small-muted, .readonly-label {
            color: #647069;
        }

        .readonly-label {
            font-size: 0.78rem;
            text-transform: uppercase;
        }

        .btn-pescd {
            background: #1f6f4a;
            border-color: #1f6f4a;
            color: #fff;
            font-weight: 700;
        }

        .btn-pescd:hover {
            background: #155637;
            border-color: #155637;
            color: #fff;
        }

        .btn-outline-pescd {
            border-color: #1f6f4a;
            color: #1f6f4a;
            font-weight: 700;
        }

        .btn-outline-pescd:hover {
            background: #1f6f4a;
            color: #fff;
        }

        .panel {
            background: #fbfdf9;
            border: 1px solid #d9e0da;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="container content-shell py-3 d-flex flex-column flex-sm-row justify-content-between gap-3">
        <div>
            <div class="h4 mb-1" th:text="#{login.brand}">PESCD</div>
            <div class="small-muted">
                <span th:text="#{dashboard.logged.as}">Logado como</span>
                <strong sec:authentication="name">usuario</strong>
            </div>
        </div>
        <a class="btn btn-outline-pescd align-self-start" th:href="@{/supervisor/supervisao}" th:text="#{botao.voltar.lista}">
            Voltar a lista
        </a>
    </div>
</header>

<main class="container content-shell py-5">
    <div class="mb-4">
        <h1 class="display-6 mb-2" th:text="#{supervisor.plano.titulo}">Aprovar plano de trabalho</h1>
        <p class="small-muted mb-0" th:text="#{supervisor.plano.subtitulo}">
            Confira o plano enviado antes de registrar o parecer.
        </p>
    </div>

    <div class="alert alert-danger" th:if="${errorMessageKey}" th:text="#{${errorMessageKey}}">
        Erro de validacao.
    </div>

    <section class="panel p-4 mb-4">
        <h2 class="h5 mb-3" th:text="#{supervisor.secao.dados}">Dados para analise</h2>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="readonly-label" th:text="#{aluno.campo.nome}">Aluno</div>
                <div th:text="${matricula.aluno.nomeCompleto}">Aluno</div>
            </div>
            <div class="col-md-6">
                <div class="readonly-label" th:text="#{oferta.campo.nome}">Oferta</div>
                <div th:text="${oferta.nome}">Oferta</div>
            </div>
            <div class="col-md-4">
                <div class="readonly-label" th:text="#{plano.campo.codigo}">Codigo</div>
                <div th:text="${plano.codigoDisciplina}">DISC001</div>
            </div>
            <div class="col-md-8">
                <div class="readonly-label" th:text="#{plano.campo.nome}">Disciplina</div>
                <div th:text="${plano.nomeDisciplina}">Disciplina</div>
            </div>
            <div class="col-md-6">
                <div class="readonly-label" th:text="#{plano.campo.curso}">Curso</div>
                <div th:text="${plano.cursoDisciplina}">Curso</div>
            </div>
            <div class="col-md-6">
                <div class="readonly-label" th:text="#{supervisor.campo.arquivo.plano}">Arquivo do plano</div>
                <a class="btn btn-sm btn-outline-pescd mt-1"
                   target="_blank"
                   th:href="@{/supervisor/supervisao/{id}/plano(id=${matricula.id})}"
                   th:text="#{supervisor.botao.abrir.pdf}">
                    Abrir PDF
                </a>
            </div>
        </div>
    </section>

    <form class="panel p-4"
          th:action="@{/supervisor/supervisao/{id}/aprovar-plano(id=${matricula.id})}"
          th:object="${aprovarPlanoSupervisorForm}"
          method="post">
        <div>
            <label class="form-label" for="parecer" th:text="#{supervisor.campo.parecer}">Parecer *</label>
            <textarea class="form-control" id="parecer" rows="5" th:field="*{parecer}"></textarea>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('parecer')}" th:errors="*{parecer}">
                Parecer obrigatorio.
            </div>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end mt-4">
            <a class="btn btn-outline-pescd" th:href="@{/supervisor/supervisao}" th:text="#{botao.cancelar}">Cancelar</a>
            <button class="btn btn-pescd" type="submit" th:text="#{supervisor.botao.aprovar}">Aprovar</button>
        </div>
    </form>
</main>
</body>
</html>
