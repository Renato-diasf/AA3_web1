<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{secretario/layout :: head(#{encerrar.titulo})}"></head>
<body>
<div th:replace="~{secretario/layout :: header}"></div>
<main>
    <div th:replace="~{secretario/layout :: alerts}"></div>
    <h1 th:text="#{encerrar.titulo}">Encerrar oferta</h1>
    <p class="subtitle" th:text="#{encerrar.subtitulo(${oferta.nome})}">Confirme o encerramento</p>
    <h2 style="font-size:1.1rem;" th:text="#{encerrar.instrucoes.titulo}">Instruções</h2>
    <ul class="instrucoes">
        <li th:each="instrucao : ${instrucoes}" th:text="${instrucao}">Instrução</li>
    </ul>
    <form th:action="@{/secretario/ofertas/{id}/encerrar(id=${oferta.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <p th:text="#{encerrar.confirmacao}">Deseja confirmar?</p>
        <div class="actions">
            <button type="submit" class="btn btn-primary" th:text="#{encerrar.botao.confirmar}">Confirmar encerramento</button>
            <a class="btn" th:href="@{/secretario/ofertas/{id}(id=${oferta.id})}" th:text="#{botao.cancelar}">Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
