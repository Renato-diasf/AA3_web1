<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{secretario/layout :: head(#{oferta.detalhes.titulo})}"></head>
<body>
<div th:replace="~{secretario/layout :: header}"></div>
<main>
    <div th:replace="~{secretario/layout :: alerts}"></div>
    <h1 th:text="${oferta.nome}">Oferta</h1>
    <p class="subtitle">
        <span th:text="${oferta.semestre}">2026/1</span> ·
        <span class="badge" th:text="#{'oferta.status.' + ${ofertaResumo.statusExibicao().name()}}">Status</span>
    </p>
    <p style="font:0.9rem Verdana;color:var(--muted);">
        <span th:text="#{oferta.campo.periodo}">Período</span>:
        <span th:text="${#temporals.format(oferta.dataInicio, 'dd/MM/yyyy')}"></span> —
        <span th:text="${#temporals.format(oferta.dataFim, 'dd/MM/yyyy')}"></span>
        · <span th:text="#{oferta.campo.professor}">Professor</span>:
        <span th:text="${oferta.professorResponsavel.nomeCompleto}"></span>
    </p>
    <div class="actions">
        <a class="btn" th:href="@{/secretario/ofertas/{id}/alunos(id=${oferta.id})}" th:text="#{oferta.botao.alunos}">Gerenciar alunos</a>
        <a class="btn" th:if="${ofertaResumo.podeEncerrar()}" th:href="@{/secretario/ofertas/{id}/encerrar(id=${oferta.id})}" th:text="#{oferta.botao.encerrar}">Encerrar</a>
        <a class="btn" th:href="@{/secretario/ofertas}" th:text="#{botao.voltar.lista}">Voltar</a>
    </div>
    <h2 style="margin-top:32px;font-size:1.3rem;" th:text="#{oferta.alunos.titulo}">Alunos</h2>
    <table th:if="${!#lists.isEmpty(alunos)}">
        <thead>
        <tr>
            <th th:text="#{aluno.campo.ra}">RA</th>
            <th th:text="#{aluno.campo.nome}">Nome</th>
            <th th:text="#{aluno.campo.email}">E-mail</th>
            <th th:text="#{aluno.campo.status}">Status estágio</th>
            <th th:text="#{oferta.campo.acoes}">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${alunos}">
            <td th:text="${m.aluno.ra}">RA</td>
            <td th:text="${m.aluno.nomeCompleto}">Nome</td>
            <td th:text="${m.aluno.email}">email</td>
            <td th:text="#{'status.aluno.' + ${m.status.name()}}">Status</td>
            <td>
                <a class="btn" th:href="@{/secretario/ofertas/{oid}/alunos/{mid}/detalhes(oid=${oferta.id}, mid=${m.id})}" th:text="#{aluno.botao.detalhes}">Ver detalhes</a>
            </td>
        </tr>
        </tbody>
    </table>
    <p class="empty" th:if="${#lists.isEmpty(alunos)}" th:text="#{oferta.alunos.vazio}">Nenhum aluno vinculado.</p>
</main>
</body>
</html>
