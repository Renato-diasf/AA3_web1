<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{secretario/layout :: head(#{aluno.detalhes.titulo})}"></head>
<body>
<div th:replace="~{secretario/layout :: header}"></div>
<main>
    <h1 th:text="#{aluno.detalhes.titulo}">Detalhes do aluno</h1>
    <p class="subtitle" th:text="${oferta.nome}">Oferta</p>
    <dl style="font:0.9rem Verdana;">
        <dt th:text="#{aluno.campo.ra}">RA</dt>
        <dd th:text="${matricula.aluno.ra}">-</dd>
        <dt th:text="#{aluno.campo.nome}">Nome</dt>
        <dd th:text="${matricula.aluno.nomeCompleto}">-</dd>
        <dt th:text="#{aluno.campo.email}">E-mail</dt>
        <dd th:text="${matricula.aluno.email}">-</dd>
        <dt th:text="#{aluno.campo.status}">Status atual</dt>
        <dd th:text="#{'status.aluno.' + ${matricula.status.name()}}">-</dd>
    </dl>
    <h2 style="margin-top:24px;font-size:1.1rem;" th:text="#{aluno.log.titulo}">Histórico de status</h2>
    <table th:if="${!#lists.isEmpty(logs)}">
        <thead>
        <tr>
            <th th:text="#{aluno.log.data}">Data</th>
            <th th:text="#{aluno.log.anterior}">Anterior</th>
            <th th:text="#{aluno.log.novo}">Novo</th>
            <th th:text="#{aluno.log.observacao}">Observação</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="log : ${logs}">
            <td th:text="${#temporals.format(log.alteradoEm, 'dd/MM/yyyy HH:mm')}">-</td>
            <td th:text="#{'status.aluno.' + ${log.statusAnterior.name()}}">-</td>
            <td th:text="#{'status.aluno.' + ${log.statusNovo.name()}}">-</td>
            <td th:text="${log.observacao}">-</td>
        </tr>
        </tbody>
    </table>
    <p class="empty" th:if="${#lists.isEmpty(logs)}" th:text="#{aluno.log.vazio}">Sem histórico.</p>
    <div class="actions">
        <a class="btn" th:href="@{/secretario/ofertas/{id}/alunos(id=${oferta.id})}" th:text="#{botao.voltar.lista}">Voltar</a>
    </div>
</main>
</body>
</html>
