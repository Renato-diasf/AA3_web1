<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{secretario/layout :: head(#{aluno.form.titulo})}"></head>
<body>
<div th:replace="~{secretario/layout :: header}"></div>
<main>
    <div th:replace="~{secretario/layout :: alerts}"></div>
    <h1 th:text="#{aluno.form.titulo}">Aluno</h1>
    <p class="subtitle" th:text="${oferta.nome}">Oferta</p>
    <form th:action="${matricula != null} ? @{/secretario/ofertas/{oid}/alunos/{mid}/editar(oid=${oferta.id}, mid=${matricula.id})} : @{/secretario/ofertas/{id}/alunos/novo(id=${oferta.id})}"
          th:object="${alunoForm}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label for="ra" th:text="#{aluno.campo.ra}">RA</label>
        <input id="ra" type="text" th:field="*{ra}" required/>
        <label for="nomeCompleto" th:text="#{aluno.campo.nome}">Nome completo</label>
        <input id="nomeCompleto" type="text" th:field="*{nomeCompleto}" required/>
        <label for="email" th:text="#{aluno.campo.email}">E-mail</label>
        <input id="email" type="email" th:field="*{email}" required/>
        <div class="actions">
            <button type="submit" class="btn btn-primary" th:text="#{botao.salvar}">Salvar</button>
            <a class="btn" th:href="@{/secretario/ofertas/{id}/alunos(id=${oferta.id})}" th:text="#{botao.cancelar}">Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
